syntax = "proto3";

package dynamo.v1;

option java_multiple_files = true;
option java_package = "com.orionkv.proto";
option java_outer_classname = "ClientProto";

service ClientService {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
}

message PutRequest {
  string request_id = 1;
  string key = 2;
  bytes value = 3;
}

message PutResponse {
  bool success = 1;
  string message = 2;
  string coordinator_node_id = 3;
  int32 ack_count = 4;
}

message GetRequest {
  string request_id = 1;
  string key = 2;
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
  int64 timestamp_epoch_ms = 3;
  string winning_node_id = 4;
  string message = 5;
}
