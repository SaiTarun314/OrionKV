syntax = "proto3";

package orionkv.node;

option java_multiple_files = true;
option java_package = "com.orionkv.proto";

import "google/protobuf/empty.proto";

enum MemberStatusProto {
  MEMBER_STATUS_UNSPECIFIED = 0;
  ALIVE = 1;
  SUSPECT = 2;
  DEAD = 3;
}

message MemberRecordProto {
  string node_id = 1;
  string address = 2;
  MemberStatusProto status = 3;
  int64 incarnation = 4;
  string last_seen = 5;
}

message GossipPayload {
  string source_node_id = 1;
  repeated MemberRecordProto membership = 2;
}

message JoinNodeRequest {
  string node_id = 1;
  string address = 2;
}

message MembershipState {
  string responder_node_id = 1;
  repeated MemberRecordProto membership = 2;
}

service GossipRpc {
  rpc Gossip(GossipPayload) returns (MembershipState);
}

service ClusterRpc {
  rpc Join(JoinNodeRequest) returns (MembershipState);
  rpc GetMembership(google.protobuf.Empty) returns (MembershipState);
}
